<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Nancy Drew: Secrets Can Kill</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #ccc;
      font-family: Georgia, 'Times New Roman', serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Fullscreen layout ── */
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Canvas area: fills available space, centered ── */
    #game-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #game-canvas {
      display: block;
      /* Fill width, maintain aspect ratio, letterbox vertically */
      width: 100%;
      max-height: 100%;
      aspect-ratio: 536 / 292;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Conversation overlay (on top of canvas, animation OFF) ── */
    #conv-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 32px;
      z-index: 20;
    }
    #conv-overlay.active { display: flex; }

    #conv-speaker {
      color: #b8903a;
      font-size: 1em;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    #conv-text {
      color: #eee;
      font-size: 1.1em;
      line-height: 1.7;
      text-align: center;
      max-width: 80%;
      margin-bottom: 22px;
      white-space: pre-wrap;
    }

    #conv-choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }

    .choice-btn {
      background: #10101e;
      border: 1px solid #4a3a18;
      color: #ddd;
      padding: 14px 20px;
      font-family: Georgia, serif;
      font-size: 1em;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, border-color 0.12s;
    }
    .choice-btn:active { background: #1a1a32; border-color: #b8903a; color: #fff; }
    .choice-btn .hl { color: #b8903a; font-weight: bold; }

    #conv-continue {
      margin-top: 14px;
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 10px 32px;
      font-family: Georgia, serif;
      font-size: 1em;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #conv-continue:active { border-color: #b8903a; color: #b8903a; }

    /* ── Conversation overlay: below-canvas mode (animation ON) ──
         When NPC animation plays on canvas, conversation text appears
         in a panel below the canvas instead of on top of it. ── */
    #conv-overlay.below-canvas {
      position: static;
      background: #0a0a0a;
      border-top: 1px solid #2a2a2a;
      width: 100%;
      flex: 0 0 auto;
      max-height: 45%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 24px;
    }

    /* When below-canvas conversation is showing, shrink the canvas area */
    #game-container:has(#conv-overlay.below-canvas.active) #game-wrap {
      flex: 1;
    }

    /* ── Map / travel overlay ── */
    #map-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 20;
    }
    #map-overlay.active { display: flex; }

    #map-title {
      color: #b8903a;
      font-size: 1em;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #map-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 300px;
      max-width: 80%;
    }

    .map-loc-btn {
      background: #10101e;
      border: 1px solid #4a3a18;
      color: #ddd;
      padding: 14px 20px;
      font-family: Georgia, serif;
      font-size: 1em;
      cursor: pointer;
      text-align: center;
      letter-spacing: 1px;
      transition: background 0.12s, border-color 0.12s;
    }
    .map-loc-btn:active { background: #1a1a32; border-color: #b8903a; color: #fff; }
    .map-loc-btn.current { border-color: #555; color: #555; }

    #map-close {
      margin-top: 6px;
      background: none;
      border: 1px solid #333;
      color: #555;
      padding: 8px 24px;
      font-family: Georgia, serif;
      font-size: 0.9em;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #map-close:active { border-color: #b8903a; color: #b8903a; }

    /* ── Game-end / puzzle / continue overlays ── */
    #gameover-overlay, #puzzle-overlay, #continue-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 25;
    }
    #gameover-overlay.active, #puzzle-overlay.active, #continue-overlay.active { display: flex; }

    .overlay-title {
      color: #b8903a;
      font-size: 1.2em;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .overlay-msg {
      color: #ccc;
      font-size: 1em;
      text-align: center;
      max-width: 80%;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .overlay-btn {
      background: #10101e;
      border: 1px solid #4a3a18;
      color: #ddd;
      padding: 14px 36px;
      font-family: Georgia, serif;
      font-size: 1em;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.12s, border-color 0.12s;
    }
    .overlay-btn:active { background: #1a1a32; border-color: #b8903a; color: #fff; }

    /* ── Inventory bar ── */
    #inv-bar {
      width: 100%;
      min-height: 68px;
      background: #080808;
      border-top: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      padding: 4px 8px;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
    }

    .inv-slot {
      flex-shrink: 0;
      width: 58px;
      height: 58px;
      border: 1px solid #2a2a2a;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    .inv-slot.inv-selected { border-color: #e8c34a; background: #1a1708; box-shadow: 0 0 6px rgba(232, 195, 74, 0.4); }
    .inv-slot canvas { display: block; }
    .inv-slot .inv-label {
      font-size: 7px;
      color: #888;
      text-align: center;
      padding: 1px 2px;
      line-height: 1.2;
    }

    #inv-empty {
      font-size: 0.72em;
      color: #333;
      padding: 0 12px;
      font-style: italic;
    }

    /* ── Hidden elements (debug/status — engine expects them in DOM) ── */
    #status-bar { display: none; }
    #status-bar.ipad-visible {
      display: flex;
      width: 100%;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: center;
      padding: 5px 8px;
      gap: 6px;
      font-size: 0.72em;
      color: #444;
      background: #080808;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    #status-bar.ipad-visible #scene-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    #status-bar.ipad-visible #scene-input {
      background: #111;
      border: 1px solid #333;
      color: #888;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 1em;
      width: 60px;
    }
    #status-bar.ipad-visible .ctrl-btn {
      background: none;
      border: 1px solid #333;
      color: #555;
      padding: 4px 10px;
      font-size: 1em;
      font-family: Georgia, serif;
    }
    #status-bar.ipad-visible .ctrl-btn.dp-active { color: #6f6; border-color: #4a4; }
    #debug-panel { display: none; }
    #debug-panel.ipad-visible { display: block; width: 100%; font-size: 0.72em; color: #888; background: #0a0a0a; border-top: 1px solid #222; padding: 6px 8px; flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; max-height: 40vh; }
    #scene-info { display: none; }
    #debug-info { display: none; }
    #title { display: none; }

    /* ── Debug tap zone ── */
    #debug-tap-zone {
      position: absolute;
      top: 0; left: 0;
      width: 44px;
      height: 44px;
      z-index: 30;
    }

    /* ── Touch feedback ── */
    @media (hover: none) {
      .choice-btn:hover { background: #10101e; border-color: #4a3a18; color: #ddd; }
      .map-loc-btn:hover { background: #10101e; border-color: #4a3a18; color: #ddd; }
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="title">Nancy Drew: Secrets Can Kill</div>

  <div id="game-wrap">
    <div id="debug-tap-zone"></div>
    <canvas id="game-canvas" width="536" height="292"></canvas>

    <div id="conv-overlay">
      <div id="conv-speaker"></div>
      <div id="conv-text"></div>
      <div id="conv-choices"></div>
      <button id="conv-continue" onclick="ND.continueConv()">[ Continue ]</button>
    </div>

    <div id="map-overlay">
      <div id="map-title">Travel Map</div>
      <div id="map-btns"></div>
      <button id="map-close" onclick="ND.hideMapDialog()">[ Close ]</button>
    </div>

    <div id="gameover-overlay">
      <div id="gameover-title" class="overlay-title"></div>
      <div id="gameover-msg" class="overlay-msg"></div>
      <button id="second-chance-btn" class="overlay-btn" onclick="ND.loadSecondChance()" style="display:none">[ Second Chance ]</button>
      <button class="overlay-btn" onclick="location.reload()">[ Play Again ]</button>
    </div>

    <div id="puzzle-overlay">
      <div class="overlay-title">Puzzle</div>
      <div id="puzzle-name" class="overlay-msg"></div>
      <button id="puzzle-solve" class="overlay-btn">[ Solve Puzzle ]</button>
      <button id="puzzle-back" class="overlay-btn">[ Go Back ]</button>
    </div>

    <div id="continue-overlay">
      <div class="overlay-title">Nancy Drew: Secrets Can Kill</div>
      <div class="overlay-msg">A saved game was found.</div>
      <button id="continue-btn" class="overlay-btn">[ Continue ]</button>
      <button id="newgame-btn" class="overlay-btn">[ New Game ]</button>
    </div>
  </div>

  <div id="inv-bar">
    <span id="inv-empty">Inventory empty</span>
  </div>

  <div id="status-bar">
    <div id="scene-nav">
      <input id="scene-input" type="text" placeholder="S10" title="Go to scene">
      <button class="ctrl-btn" onclick="ND.goToScene(document.getElementById('scene-input').value)">Go</button>
      <button id="menu-btn" class="ctrl-btn" onclick="ND.showMenu(true)">Menu</button>
      <button class="ctrl-btn" onclick="ND.toggleDebug()">Debug</button>
      <button class="ctrl-btn" onclick="ND.back()">Back</button>
      <button id="anim-toggle-btn" class="ctrl-btn" onclick="ND.toggleAnimation()">Anim: OFF</button>
      <button id="voice-toggle-btn" class="ctrl-btn" onclick="ND.toggleVoices()">Voice: OFF</button>
      <button id="autopan-toggle-btn" class="ctrl-btn" onclick="ND.toggleAutoPan()">AutoPan: OFF</button>
    </div>
    <div id="scene-info"></div>
    <div id="debug-info"></div>
  </div>
  <div id="debug-panel"></div>
</div>

<script src="engine.js"></script>
<script>
  // ── Touch → mouse event bridge ──
  // The engine listens for click and mousemove on the canvas.
  // Map touch events to the equivalent mouse events so taps work.
  (function() {
    const canvas = document.getElementById('game-canvas');

    function touchToMouse(type, touch) {
      const rect = canvas.getBoundingClientRect();
      return new MouseEvent(type, {
        clientX: touch.clientX,
        clientY: touch.clientY,
        bubbles: true,
        cancelable: true,
      });
    }

    // Single-tap → click
    canvas.addEventListener('touchend', function(e) {
      if (e.changedTouches.length === 1) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        // Fire a mousemove first so the engine can update hover/cursor state
        canvas.dispatchEvent(touchToMouse('mousemove', touch));
        canvas.dispatchEvent(touchToMouse('click', touch));
      }
    }, { passive: false });

    // Touch move → mousemove (for auto-pan at edges)
    canvas.addEventListener('touchmove', function(e) {
      if (e.touches.length === 1) {
        e.preventDefault();
        canvas.dispatchEvent(touchToMouse('mousemove', e.touches[0]));
      }
    }, { passive: false });

    // Touch end outside canvas → mouseleave
    canvas.addEventListener('touchcancel', function() {
      canvas.dispatchEvent(new MouseEvent('mouseleave', { bubbles: true }));
    });

    // Long-press → context menu (deselect inventory item)
    let longPressTimer = null;
    canvas.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) {
        longPressTimer = setTimeout(() => {
          canvas.dispatchEvent(new MouseEvent('contextmenu', {
            clientX: e.touches[0].clientX,
            clientY: e.touches[0].clientY,
            bubbles: true,
            cancelable: true,
          }));
        }, 500);
      }
    }, { passive: true });

    canvas.addEventListener('touchend', function() {
      clearTimeout(longPressTimer);
    }, { passive: true });

    canvas.addEventListener('touchmove', function() {
      clearTimeout(longPressTimer);
    }, { passive: true });
  })();

  // ── Triple-tap top-left corner to toggle debug controls ──
  (function() {
    const zone = document.getElementById('debug-tap-zone');
    let tapCount = 0;
    let tapTimer = null;
    zone.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      tapCount++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, 400);
      if (tapCount >= 3) {
        tapCount = 0;
        const bar = document.getElementById('status-bar');
        const panel = document.getElementById('debug-panel');
        const show = !bar.classList.contains('ipad-visible');
        bar.classList.toggle('ipad-visible', show);
        if (!show) panel.classList.remove('ipad-visible');
        else panel.classList.add('ipad-visible');
      }
    }, { passive: false });
  })();

  // ── Init ──
  ND.init({
    scenesUrl:    'nd1_scenes.json',
    framesDir:    'nd1_avf_frames',
    audioDir:     'nd1_audio',
    spritesDir:   'nd1_images',
    startScene:   'S5',
    initialFlags: { 5: 1, 101: 1 },
  }).then(() => {
    ND.toggleVoices();
    ND.toggleAutoPan();
  });
</script>
</body>
</html>
